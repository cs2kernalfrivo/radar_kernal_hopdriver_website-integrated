{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS2 Web Radar - All Maps</title>
    <style>
        body { 
            background-color: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #map-header {
            width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #map-title { 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #eee;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #f44336; /* Default Red */
            box-shadow: 0 0 10px #f44336;
        }
        .online-dot { background-color: #4caf50 !important; box-shadow: 0 0 10px #4caf50 !important; }

        #map-container {
            position: relative;
            width: 1000px;
            height: 1000px;
            background-color: #1a1a1a;
            background-size: 1000px 1000px;
            background-repeat: no-repeat;
            border: 4px solid #333;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        .player-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: left 0.08s linear, top 0.08s linear;
        }

        .player-name {
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 2px 2px 3px black;
            transform: translate(-50%, -26px);
            white-space: nowrap;
            z-index: 11;
        }

        /* Team Colors */
        .team-2 { background-color: #ff9800; border-color: #ffcc80; } /* Terrorists */
        .team-3 { background-color: #2196f3; border-color: #90caf9; } /* Counter-Terrorists */
    </style>
</head>
<body>

    <div id="map-header">
        <h1 id="map-title">Waiting for game...</h1>
        <div id="status-dot" title="Connection Status"></div>
    </div>
    
    <div id="map-container">
        <div id="player-layer"></div>
    </div>

    <script>
        const playerLayer = document.getElementById('player-layer');
        const mapContainer = document.getElementById('map-container');
        const mapTitle = document.getElementById('map-title');
        const statusDot = document.getElementById('status-dot');

        // --- MAP CONFIGURATIONS (Internal Name vs Your Filenames) ---
        const mapConfigs = {
            "de_dust2":    { "img": "{% static 'radar/Cs2_dust2_overview.webp' %}", "x": -2476, "y": 3239, "scale": 4.4 },
            "de_mirage":   { "img": "{% static 'radar/Cs2_mirage_radar.webp' %}",  "x": -3230, "y": 1713, "scale": 5.0 },
            "de_inferno":  { "img": "{% static 'radar/CS2_inferno_radar.webp' %}", "x": -2087, "y": 3870, "scale": 4.9 },
            "de_ancient":  { "img": "{% static 'radar/Ancient_Radar.webp' %}",     "x": -2976, "y": 2176, "scale": 5.0 },
            "cs_italy":    { "img": "{% static 'radar/Cs2_italy_radar.webp' %}",   "x": -2647, "y": 2592, "scale": 4.45 },
            "de_nuke":     { "img": "{% static 'radar/Cs2_nuke_radar.webp' %}",    "x": -3453, "y": 2887, "scale": 7.0 },
            "cs_office":   { "img": "{% static 'radar/Cs2_office_radar.webp' %}",  "x": -1838, "y": 1858, "scale": 4.1 },
            "de_overpass": { "img": "{% static 'radar/Cs2_overpass_radar.webp' %}", "x": -4831, "y": 1781, "scale": 5.2 },
            "de_train":    { "img": "{% static 'radar/CS2_Train_radar.webp' %}",    "x": -2477, "y": 2392, "scale": 4.7 },
            "de_anubis":   { "img": "{% static 'radar/De_anubis_radar_cs2.webp' %}", "x": -2796, "y": 3328, "scale": 5.22 },
            "de_vertigo":  { "img": "{% static 'radar/De_vertigo_radar.webp' %}",   "x": -3168, "y": 1762, "scale": 4.0 }
        };

        let currentActiveMap = "";
        const resizeFactor = 1000 / 1024; // Converts standard 1024 coords to your 1000px map

        const socket = new WebSocket('ws://' + window.location.host + '/ws/radar/');

        socket.onopen = () => statusDot.classList.add('online-dot');
        socket.onclose = () => statusDot.classList.remove('online-dot');

        socket.onmessage = function(e) {
            const packet = JSON.parse(e.data);
            
            // Clean the map name (strip "maps/" prefix if present)
            let rawMapName = packet.MapName || "unknown";
            let cleanMapName = rawMapName.replace("maps/", "").replace(".vpk", "");

            // Change background if map switched
            if (cleanMapName !== currentActiveMap) {
                currentActiveMap = cleanMapName;
                mapTitle.innerText = "Current Map: " + currentActiveMap.replace("de_", "").replace("cs_", "");
                
                const config = mapConfigs[currentActiveMap];
                if (config) {
                    mapContainer.style.backgroundImage = `url(${config.img})`;
                } else {
                    mapContainer.style.backgroundImage = "none";
                    console.warn("No config found for: " + currentActiveMap);
                }
            }

            // Draw players
            renderFrame(packet.Players, currentActiveMap);
        };

        function renderFrame(players, mapName) {
            playerLayer.innerHTML = ''; 
            const config = mapConfigs[mapName];
            if (!config || !players) return;

            players.forEach(p => {
                // Official Coordinate Conversion Math
                const mapX = ((p.X - config.x) / config.scale) * resizeFactor;
                const mapY = ((config.y - p.Y) / config.scale) * resizeFactor;

                // Ensure dots stay inside the 1000x1000 area
                if (mapX >= 0 && mapX <= 1000 && mapY >= 0 && mapY <= 1000) {
                    // Create DOT
                    const dot = document.createElement('div');
                    dot.className = `player-dot team-${p.Team}`;
                    dot.style.left = mapX + 'px';
                    dot.style.top = mapY + 'px';

                    // Create NAME
                    const nameLabel = document.createElement('div');
                    nameLabel.className = 'player-name';
                    nameLabel.style.left = mapX + 'px';
                    nameLabel.style.top = mapY + 'px';
                    nameLabel.innerText = p.Name;

                    playerLayer.appendChild(dot);
                    playerLayer.appendChild(nameLabel);
                }
            });
        }
    </script>
</body>
</html>
